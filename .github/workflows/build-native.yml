name: Build Native Bindings

on:
  push:
    paths:
      - 'src/pysysinfo/interops/mac/**'
      - 'src/pysysinfo/interops/win/**'
      - '.github/workflows/build-native.yml'
  pull_request:
    paths:
      - 'src/pysysinfo/interops/mac/**'
      - 'src/pysysinfo/interops/win/**'
      - '.github/workflows/build-native.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-mac:
    runs-on: macos-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(toJSON(github.event.commits.*.modified), 'interops/mac') ||
      contains(toJSON(github.event.commits.*.added), 'interops/mac') ||
      contains(toJSON(github.event.pull_request.changed_files), 'interops/mac') ||
      contains(toJSON(github.event.commits.*.modified), 'build-native.yml')
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S src/pysysinfo/interops/mac -B build-mac -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-mac

      - name: Verify artifact
        run: |
          file src/pysysinfo/interops/mac/bindings/libdevice_info.dylib
          otool -L src/pysysinfo/interops/mac/bindings/libdevice_info.dylib

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: libdevice_info-macos
          path: src/pysysinfo/interops/mac/bindings/libdevice_info.dylib

  build-win:
    runs-on: windows-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(toJSON(github.event.commits.*.modified), 'interops/win') ||
      contains(toJSON(github.event.commits.*.added), 'interops/win') ||
      contains(toJSON(github.event.pull_request.changed_files), 'interops/win') ||
      contains(toJSON(github.event.commits.*.modified), 'build-native.yml')
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        shell: bash
        run: |
          cmake -S src/pysysinfo/interops/win -B build-win \
            -G Ninja \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: bash
        run: cmake --build build-win

      - name: Verify artifact
        shell: bash
        run: |
          file src/pysysinfo/interops/win/bindings/device_info.dll
          objdump -p src/pysysinfo/interops/win/bindings/device_info.dll | grep "DLL Name"

      - name: Upload dll
        uses: actions/upload-artifact@v4
        with:
          name: device_info-windows
          path: src/pysysinfo/interops/win/bindings/device_info.dll
