name: Build Native Bindings

on:
  push:
    branches: [main]
    paths:
      - 'src/pysysinfo/interops/mac/**'
      - 'src/pysysinfo/interops/win/**'
      - '.github/workflows/build-native.yml'
  pull_request:
    paths:
      - 'src/pysysinfo/interops/mac/**'
      - 'src/pysysinfo/interops/win/**'
      - '.github/workflows/build-native.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S src/pysysinfo/interops/mac -B build-mac -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-mac

      - name: Verify artifact
        run: |
          file src/pysysinfo/interops/mac/bindings/libdevice_info.dylib
          otool -L src/pysysinfo/interops/mac/bindings/libdevice_info.dylib

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: libdevice_info-macos
          path: src/pysysinfo/interops/mac/bindings/libdevice_info.dylib

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        shell: bash
        run: |
          cmake -S src/pysysinfo/interops/win -B build-win \
            -G Ninja \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: bash
        run: cmake --build build-win

      - name: Verify artifact
        shell: bash
        run: |
          file src/pysysinfo/interops/win/bindings/device_info.dll
          objdump -p src/pysysinfo/interops/win/bindings/device_info.dll | grep "DLL Name"

      - name: Upload dll
        uses: actions/upload-artifact@v4
        with:
          name: device_info-windows
          path: src/pysysinfo/interops/win/bindings/device_info.dll

  commit-binaries:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: libdevice_info-macos
          path: src/pysysinfo/interops/mac/bindings/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: device_info-windows
          path: src/pysysinfo/interops/win/bindings/

      - name: Commit updated binaries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pysysinfo/interops/mac/bindings/libdevice_info.dylib
          git add src/pysysinfo/interops/win/bindings/device_info.dll
          if git diff --cached --quiet; then
            echo "No binary changes to commit"
          else
            git commit -m "build: update native bindings [skip ci]"
            git push
          fi
