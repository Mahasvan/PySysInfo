name: Build macOS Native Bindings

on:
  push:
    branches: [ main ]
    paths:
      - '../../src/hwprobe/interops/mac/include/**'
      - '../../src/hwprobe/interops/mac/src/**'
      - '../../src/hwprobe/interops/mac/CMakeLists.txt'
      - '.github/workflows/build-mac-native.yml'
  pull_request:
    paths:
      - '../../src/hwprobe/interops/mac/include/**'
      - '../../src/hwprobe/interops/mac/src/**'
      - '../../src/hwprobe/interops/mac/CMakeLists.txt'
      - '.github/workflows/build-mac-native.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S src/hwprobe/interops/mac -B build-mac -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-mac

      - name: Verify artifact
        run: |
          file src/hwprobe/interops/mac/bindings/libdevice_info.dylib
          otool -L src/hwprobe/interops/mac/bindings/libdevice_info.dylib

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: libdevice_info-macos
          path: src/hwprobe/interops/mac/bindings/libdevice_info.dylib

      - name: Commit updated binary
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/hwprobe/interops/mac/bindings/libdevice_info.dylib
          if git diff --cached --quiet; then
            echo "No binary changes to commit"
          else
            git commit -m "build: update macOS native binding [skip ci]"
            git pull --rebase
            git push
          fi
